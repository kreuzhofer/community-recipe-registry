recipe_version: "2"
model: CosmicRaisins/GLM-5.2-AWQ-INT4-15pct
runtime: vllm
container: vllm-node-tf5-glm52-b12x:probe
cluster_only: true
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.93
  max_model_len: 262144
  served_model_name: glm-5.2
env:
  LD_PRELOAD: /cache/huggingface/nccl-2.30.4/libnccl.so.2
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "1800"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
  GLM52_BIND_HOST_TRITON: "1"
  GLM52_MQA_LOGITS_TRITON: "1"
  GLM52_PAGED_MQA_TRITON: "1"
  GLM52_PAGED_MQA_TOPK_CHUNK_SIZE: "8192"
  GLM52_B12X_MLA: "1"
  NCCL_SOCKET_IFNAME: enP2p1s0f0np0
  GLOO_SOCKET_IFNAME: enP2p1s0f0np0
  NCCL_IB_DISABLE: "0"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  vllm serve {model} --served-model-name {served_model_name} --host {host} --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice -tp {tensor_parallel} --pipeline-parallel-size 1 --distributed-executor-backend ray --max-model-len {max_model_len} --max-num-seqs 1 --max-num-batched-tokens 4096 --gpu-memory-utilization {gpu_memory_utilization} --kv-cache-dtype fp8_ds_mla --compilation-config '{"cudagraph_mode":"FULL"}'
